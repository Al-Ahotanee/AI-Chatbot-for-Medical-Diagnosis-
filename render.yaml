services:
  - type: web
    name: ai-medical-diagnosis-chatbot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 60 --bind "0.0.0.0:$PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MAX_AI_REQUESTS_PER_DAY
        value: "50"
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
