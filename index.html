<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Powered Chatbot for Medical Diagnosis</title>
  <meta name="description" content="A symptom-assessment assistant that helps you understand your symptoms and their urgency before you see a physician." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Fraunces"', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: {
              50:  '#eef3f6', 100: '#d7e3ea', 400: '#3c6b85', 500: '#23506b',
              600: '#173f57', 700: '#102e41', 800: '#0b2333', 900: '#081a26',
            },
            clinical: {
              50:  '#effaf7', 100: '#d7f3ea', 400: '#2ab098', 500: '#0f9684',
              600: '#0b7a6c', 700: '#0a6258',
            },
            gold: {
              100: '#f4e9d6', 400: '#c9a25f', 500: '#b0823f', 600: '#8f6a32',
            },
            triage: {
              red:    '#dc4f4f', yellow: '#c98a2c', green:  '#1f9d6f',
            }
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: '0', transform: 'translateY(18px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'pulse-dot': {
              '0%, 100%': { transform: 'scale(0.6)', opacity: '0.4' },
              '50%':      { transform: 'scale(1)',   opacity: '1' },
            }
          },
          animation: {
            'fade-up': 'fade-up 0.7s ease-out both',
            'dot-1':   'pulse-dot 1.2s ease-in-out infinite 0s',
            'dot-2':   'pulse-dot 1.2s ease-in-out infinite 0.2s',
            'dot-3':   'pulse-dot 1.2s ease-in-out infinite 0.4s',
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cfe0e6; border-radius: 99px; }

    .glass {
      background: rgba(252,250,246,0.90);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(15,46,65,0.06);
    }

    textarea { field-sizing: content; min-height: 2.75rem; max-height: 8rem; }

    .prose-bubble strong { font-weight: 700; }
    .prose-bubble p      { margin-bottom: 0.4rem; }
    .prose-bubble p:last-child { margin-bottom: 0; }
    .prose-bubble code   { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #b91c1c; }
  </style>
</head>
<body class="bg-[#faf8f3] text-ink-800 font-sans antialiased overflow-x-hidden selection:bg-clinical-100">

<div id="view-landing">
  <div aria-hidden="true" class="pointer-events-none fixed inset-0 overflow-hidden -z-10">
    <div class="absolute -top-32 -right-32 w-[56rem] h-[56rem] rounded-full bg-gradient-to-br from-clinical-50 to-ink-50 opacity-70 blur-3xl"></div>
    <div class="absolute bottom-0 -left-40 w-[44rem] h-[44rem] rounded-full bg-gradient-to-tr from-gold-100/40 to-clinical-50 opacity-60 blur-3xl"></div>
  </div>

  <nav class="fixed top-0 inset-x-0 z-50 glass">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-ink-700 flex items-center justify-center shadow-md shadow-ink-100">
          <svg class="w-4 h-4 text-clinical-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6M12 3a9 9 0 100 18A9 9 0 0012 3z"/></svg>
        </div>
        <span class="font-serif font-semibold text-lg tracking-tight text-ink-800">AI Medical <span class="text-clinical-600">Diagnosis</span></span>
      </div>
      <button id="nav-cta" class="bg-ink-700 hover:bg-ink-800 active:bg-ink-800 text-white px-5 py-2 rounded-full text-sm font-bold transition-all shadow-md shadow-ink-100 hover:shadow-lg hover:-translate-y-px">
        Start Assessment
      </button>
    </div>
  </nav>

  <section class="pt-40 pb-28 px-6 h-screen flex flex-col justify-center">
    <div class="max-w-5xl mx-auto text-center space-y-7">
      <h1 class="font-serif text-5xl lg:text-7xl font-semibold leading-[1.05] tracking-tight text-ink-800 animate-fade-up">
        Understand your symptoms,<br>
        <span class="italic text-clinical-600">before you walk in.</span>
      </h1>
      <p class="text-xl text-ink-500 font-light max-w-2xl mx-auto leading-relaxed animate-fade-up" style="animation-delay:160ms">
        Describe how you feel in your own words and receive a clear, structured assessment — how urgent it is, what it might be, and what to do next — before your appointment.
      </p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-2 animate-fade-up">
        <button id="hero-cta" class="group bg-ink-700 hover:bg-ink-800 text-white px-8 py-4 rounded-2xl font-bold text-lg transition-all shadow-xl shadow-ink-100 hover:-translate-y-0.5">
          Start Free Assessment
        </button>
      </div>
    </div>
  </section>
</div><!-- /view-landing -->

<div id="view-chat" class="hidden fixed inset-0 flex flex-col bg-[#faf8f3]" aria-live="polite">

  <header class="glass flex-shrink-0 z-20 shadow-sm flex flex-col">
    <!-- Main Top Bar -->
    <div class="max-w-4xl mx-auto px-4 h-16 flex w-full items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="btn-back" aria-label="Back to home"
          class="w-9 h-9 rounded-xl bg-ink-50 hover:bg-ink-100 border border-ink-100 flex items-center justify-center text-ink-600 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        </button>
        <div>
          <div class="flex items-center gap-2">
            <span class="font-serif font-semibold text-ink-800 text-base">Diagnostic Console</span>
          </div>
          <p id="console-subtitle" class="text-[10px] font-bold text-clinical-600 tracking-widest uppercase leading-none mt-0.5">Dual-Engine Diagnostic System</p>
        </div>
      </div>

      <div class="flex items-center gap-2 text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-full px-3 py-1.5">
        <span class="w-2 h-2 rounded-full bg-triage-green animate-pulse"></span>
        Active
      </div>
    </div>
    
    <!-- Diagnostic Mode Tabs -->
    <div class="w-full bg-white/60 border-t border-ink-100 flex justify-center gap-6 text-[11px] font-bold uppercase tracking-widest">
      <button id="tab-auto" class="border-b-2 border-clinical-600 text-clinical-700 py-3 transition-colors px-2 hover:text-clinical-700">Auto (Fallback)</button>
      <button id="tab-gemini" class="border-b-2 border-transparent text-ink-400 hover:text-ink-700 py-3 transition-colors px-2">Force Gemini AI</button>
      <button id="tab-builtin" class="border-b-2 border-transparent text-ink-400 hover:text-ink-700 py-3 transition-colors px-2">Force Built-in</button>
    </div>
  </header>

  <main id="chat-messages" class="flex-1 overflow-y-auto px-4 py-6">
    <div class="max-w-3xl mx-auto space-y-5" id="messages-inner">
      <!-- Bubbles go here -->
    </div>
  </main>

  <footer class="flex-shrink-0 bg-white/90 backdrop-blur-xl border-t border-ink-100 z-20 shadow-[0_-4px_24px_rgba(15,46,65,0.05)]">
    <div class="max-w-3xl mx-auto px-4 py-3">
      <div class="flex items-end gap-3">
        <div class="flex-1 flex items-end bg-[#faf8f3] border border-ink-100 rounded-2xl shadow-inner focus-within:border-clinical-400 focus-within:ring-4 focus-within:ring-clinical-400/15 transition-all overflow-hidden">
          <textarea id="chat-input" rows="1" placeholder="Describe your symptoms…" class="flex-1 bg-transparent resize-none py-3 pl-4 pr-3 text-ink-700 text-sm outline-none placeholder:text-ink-300"></textarea>
        </div>
        <button id="btn-send" class="flex-shrink-0 bg-ink-700 hover:bg-ink-800 disabled:bg-ink-100 disabled:text-ink-300 disabled:cursor-not-allowed text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-md transition-all hover:-translate-y-0.5 hover:shadow-lg">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
      </div>
    </div>
  </footer>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
(function () {
  'use strict';

  const $landing = document.getElementById('view-landing');
  const $chat    = document.getElementById('view-chat');
  const $subtitle = document.getElementById('console-subtitle');
  let activeEnginePref = 'auto'; // Tracks the selected tab

  function showChat() {
    $landing.classList.add('hidden');
    $chat.classList.remove('hidden');
    document.body.classList.add('overflow-hidden');
    if(history.length === 0) {
      appendSystemMessage('Welcome. Please describe your symptoms, including when they started, where they are located, how severe they feel on a scale of 1–10, and any relevant medical history.');
    }
    input.focus();
  }

  function showLanding() {
    $chat.classList.add('hidden');
    $landing.classList.remove('hidden');
    document.body.classList.remove('overflow-hidden');
  }

  ['nav-cta','hero-cta'].forEach(id => {
    document.getElementById(id)?.addEventListener('click', showChat);
  });
  document.getElementById('btn-back')?.addEventListener('click', showLanding);

  /* ── Tab Switching Logic ────────────────────────────────────── */
  const tabs = {
    'auto': document.getElementById('tab-auto'),
    'gemini': document.getElementById('tab-gemini'),
    'builtin': document.getElementById('tab-builtin')
  };

  Object.keys(tabs).forEach(key => {
    tabs[key].addEventListener('click', () => {
      // Reset all tabs styling
      Object.values(tabs).forEach(t => {
        t.classList.remove('border-clinical-600', 'text-clinical-700');
        t.classList.add('border-transparent', 'text-ink-400');
      });
      // Activate clicked tab
      tabs[key].classList.remove('border-transparent', 'text-ink-400');
      tabs[key].classList.add('border-clinical-600', 'text-clinical-700');
      
      activeEnginePref = key;
      appendSystemMessage(`⚙️ Switched diagnostic mode to: **${key.toUpperCase()}**`);
    });
  });

  /* ── Chat state ─────────────────────────────────────────────── */
  let history = [];
  let loading = false;

  const inner  = document.getElementById('messages-inner');
  const input  = document.getElementById('chat-input');
  const sendBtn = document.getElementById('btn-send');

  input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim() || loading; });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function scrollBottom() {
    const scroller = document.getElementById('chat-messages');
    scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
  }

  function renderContent(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>') // render inline code blocks for errors
      .split('\n')
      .map(line => line === '' ? '<br>' : `<p>${line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`)
      .join('');
  }

  function engineTagHtml(engineType) {
    if (!engineType) return '';
    const map = {
      ai:     { label: 'Online Assessment Engine',  cls: 'bg-clinical-50 text-clinical-700 border-clinical-200' },
      engine: { label: 'Built-in Diagnostic Engine', cls: 'bg-gold-100 text-gold-600 border-gold-400/40' },
      cache:  { label: 'Retrieved from Case Records',cls: 'bg-sky-50 text-sky-600 border-sky-200' },
      error:  { label: 'API Connection Error', cls: 'bg-rose-50 text-rose-700 border-rose-200' },
    };
    const tag = map[engineType];
    if (!tag) return '';
    return `<span class="inline-block mb-2 text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full border ${tag.cls}">${tag.label}</span>`;
  }

  function appendBubble(role, content, engineType) {
    const isUser   = role === 'user';
    const isError  = role === 'error' || engineType === 'error';
    const isSystem = role === 'system';

    const wrap = document.createElement('div');
    wrap.className = `flex gap-3 animate-fade-up ${isUser ? 'flex-row-reverse' : ''}`;

    const avatarClasses = isUser
      ? 'bg-ink-700 text-white'
      : isError
        ? 'bg-rose-100 text-rose-600'
        : 'bg-clinical-600 text-white';

    const avatarIcon = isUser
      ? `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`
      : isError
        ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`
        : `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>`;

    const bubbleClasses = isUser
      ? 'bg-ink-700 text-white border-ink-700 rounded-tr-sm'
      : isError
        ? 'bg-white text-rose-700 border-rose-200 rounded-tl-sm'
        : isSystem
          ? 'bg-clinical-50 text-clinical-900 border-clinical-100 rounded-tl-sm font-medium text-xs'
          : 'bg-white text-ink-700 border-ink-100 rounded-tl-sm';

    wrap.innerHTML = `
      <div class="flex-shrink-0 w-9 h-9 rounded-xl ${avatarClasses} flex items-center justify-center shadow-sm">
        ${avatarIcon}
      </div>
      <div class="max-w-[82%] rounded-3xl ${bubbleClasses} border px-5 py-3.5 text-sm leading-relaxed shadow-sm prose-bubble">
        ${engineTagHtml(engineType)}
        ${renderContent(content)}
      </div>`;

    inner.appendChild(wrap);
    scrollBottom();
  }

  function appendSystemMessage(text) {
    appendBubble('system', text);
    // Don't push mode-switch messages to API history array
    if (!text.includes('⚙️')) {
        history.push({ role: 'system', content: text });
    }
  }

  let typingEl = null;
  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'flex gap-3 animate-fade-up';
    typingEl.innerHTML = `
      <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-clinical-600 text-white flex items-center justify-center shadow-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      <div class="bg-white border border-ink-100 rounded-3xl rounded-tl-sm px-5 h-12 flex items-center gap-1.5 shadow-sm">
        <span class="w-2.5 h-2.5 rounded-full bg-clinical-400 animate-dot-1 inline-block"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-clinical-400 animate-dot-2 inline-block"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-clinical-400 animate-dot-3 inline-block"></span>
      </div>`;
    inner.appendChild(typingEl);
    scrollBottom();
  }

  function hideTyping() {
    typingEl?.remove();
    typingEl = null;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = '';

    const userMsg = { role: 'user', content: text };
    history.push(userMsg);
    appendBubble('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          history: history, 
          engine_preference: activeEnginePref // Sending the tab state!
        }),
      });

      const data = await res.json();
      hideTyping();

      if (!res.ok || data.error) {
        appendBubble('error', data.error || `Server error ${res.status}.`);
      } else {
        if (data.engine !== 'error') {
            history.push({ role: 'assistant', content: data.text });
        }
        appendBubble('assistant', data.text, data.engine);
      }
    } catch (err) {
      hideTyping();
      appendBubble('error', 'Connection lost. Check your network and try again.');
    } finally {
      loading = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }
  }

})();
});
</script>
</body>
</html>
