<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediBot — Dual Engine Symptom Checker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; }
  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  @keyframes blink { 0%,80%,100% { opacity:0.2 } 40% { opacity:1 } }
  .dot { animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

function renderMarkdown(text) {
  const html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
  return { __html: html };
}

const SESSION_KEY = "medibot_session";

function getOrCreateSession() {
  let sid = localStorage.getItem(SESSION_KEY);
  if (!sid) {
    sid = "web-" + crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sid);
  }
  return sid;
}

/* ------------------------- Components ------------------------- */
function Header({ onReset, engine, setEngine }) {
  return (
    <header className="bg-gradient-to-r from-teal-600 to-cyan-700 text-white px-4 py-3 shadow-md flex items-center justify-between sticky top-0 z-10">
      <div className="flex items-center gap-3">
        <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-2xl">🩺</div>
        <div>
          <h1 className="font-bold text-lg leading-tight">MediBot</h1>
          <p className="text-xs text-teal-100 leading-tight">Dual Engine AI Symptom Checker</p>
        </div>
      </div>
      
      <div className="flex items-center gap-4">
        {/* Engine Toggle */}
        <div className="flex items-center bg-white/10 rounded-full p-1 text-xs">
          <button 
            onClick={() => setEngine('rule')}
            className={"px-3 py-1 rounded-full transition " + (engine === 'rule' ? 'bg-white text-teal-700 font-bold' : 'text-white/80')}
          >NLP</button>
          <button 
            onClick={() => setEngine('ai')}
            className={"px-3 py-1 rounded-full transition " + (engine === 'ai' ? 'bg-white text-teal-700 font-bold' : 'text-white/80')}
          >AI</button>
        </div>
        
        <button onClick={onReset} className="text-xs bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-md transition">New Chat</button>
      </div>
    </header>
  );
}

function DisclaimerBanner() {
  return (
    <div className="bg-amber-50 border-l-4 border-amber-400 text-amber-800 text-xs px-3 py-2">
      ⚠️ <strong>Not a substitute for professional medical advice.</strong> In emergencies, call 911.
    </div>
  );
}

function TypingIndicator() {
  return (
    <div className="flex items-center gap-2 text-slate-400 text-sm px-2">
      <span className="dot w-2 h-2 rounded-full bg-slate-400 inline-block"></span>
      <span className="dot w-2 h-2 rounded-full bg-slate-400 inline-block"></span>
      <span className="dot w-2 h-2 rounded-full bg-slate-400 inline-block"></span>
    </div>
  );
}

function MessageBubble({ msg, engine }) {
  const isUser = msg.role === "user";
  const diagnosis = msg.diagnosis;
  const isEmergency = diagnosis && diagnosis.severity === "emergency";
  
  let bubbleClass = "bg-white text-slate-800 border border-slate-200 rounded-bl-sm";
  if (isUser) {
    bubbleClass = "bg-cyan-600 text-white rounded-br-sm";
  } else if (isEmergency) {
    bubbleClass = "bg-red-50 border border-red-200 text-red-900 rounded-bl-sm";
  }

  let engineBadge = null;
  if (!isUser) {
    if (engine === 'ai') {
      engineBadge = <span className="text-[9px] font-bold text-purple-500 bg-purple-50 px-1.5 py-0.5 rounded mb-1 inline-block">AI ENGINE</span>;
    } else {
      engineBadge = <span className="text-[9px] font-bold text-teal-500 bg-teal-50 px-1.5 py-0.5 rounded mb-1 inline-block">NLP ENGINE</span>;
    }
  }

  let diagnosisCard = null;
  if (diagnosis && !isEmergency) {
    diagnosisCard = (
      <div className="mt-3 bg-teal-50/60 border border-teal-200 rounded-lg p-3 text-slate-800 text-sm">
        <div className="flex justify-between items-center mb-1">
          <span className="font-semibold text-teal-800">{diagnosis.name}</span>
          <span className="text-xs font-bold text-teal-700">{diagnosis.confidence_pct}% match</span>
        </div>
        <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden mb-2">
          <div className="h-full bg-teal-500" style={{width: Math.min(diagnosis.confidence_pct, 100) + "%"}}></div>
        </div>
        <p className="text-xs text-slate-600 mt-1">{diagnosis.advice}</p>
      </div>
    );
  }

  let symptomTags = null;
  if (msg.symptoms && msg.symptoms.length > 0) {
    const tagClass = isUser ? "bg-cyan-700/40" : "bg-teal-50 text-teal-700 border border-teal-200";
    symptomTags = (
      <div className="mt-2 flex flex-wrap gap-1">
        {msg.symptoms.map(function(s, i) {
          return <span key={i} className={"text-[10px] px-2 py-0.5 rounded-full " + tagClass}>{s}</span>;
        })}
      </div>
    );
  }

  return (
    <div className={"flex " + (isUser ? "justify-end" : "justify-start") + " mb-3"}>
      <div className={"max-w-[85%] md:max-w-[70%] " + (isUser ? "order-2" : "")}>
        <div className={"flex items-end gap-2 " + (isUser ? "flex-row-reverse" : "")}>
          <div className={"w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 " + (isUser ? "bg-cyan-600 text-white" : "bg-teal-100 text-teal-700")}>
            {isUser ? "🧑" : "🤖"}
          </div>
          <div className={"rounded-2xl px-4 py-2.5 shadow-sm " + bubbleClass}>
            {engineBadge}
            <div dangerouslySetInnerHTML={renderMarkdown(msg.content)} />
            {diagnosisCard}
            {symptomTags}
          </div>
        </div>
      </div>
    </div>
  );
}

function QuickReplies({ onPick, disabled }) {
  var suggestions = ["I have a fever and headache", "I've been coughing with a sore throat", "My stomach hurts and I feel nauseous", "I'm having chest pain", "Burning when I urinate"];
  return (
    <div className="px-3 pb-2 flex gap-2 overflow-x-auto chat-scroll">
      {suggestions.map(function(s, i) {
        return (
          <button key={i} disabled={disabled} onClick={function() { onPick(s); }}
            className="text-xs whitespace-nowrap bg-white border border-slate-300 hover:border-teal-400 hover:bg-teal-50 text-slate-700 px-3 py-1.5 rounded-full transition disabled:opacity-50">
            {s}
          </button>
        );
      })}
    </div>
  );
}

/* ------------------------- Main App ------------------------- */
function App() {
  const [sessionId] = useState(getOrCreateSession);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showQuick, setShowQuick] = useState(true);
  const [engine, setEngine] = useState("rule");
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(function() {
    var engineLabel = engine === 'rule' ? 'Rule-Based NLP Engine' : 'AI Engine (Gemini)';
    var welcome = {
      role: "bot",
      content: "Hello! I'm **MediBot**. Describe how you're feeling and I'll help identify possible conditions.\n\n*Currently using: " + engineLabel + "*",
      timestamp: new Date().toISOString(),
    };
    setMessages([welcome]);

    fetch("/api/history/" + sessionId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.messages && data.messages.length > 0) {
          setMessages([welcome].concat(data.messages));
          setShowQuick(false);
        }
      }).catch(function() {});
  }, [sessionId]);

  useEffect(function() {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  var sendMessage = useCallback(async function(text) {
    var trimmed = text.trim();
    if (!trimmed || loading) return;

    var userMsg = { role: "user", content: trimmed, timestamp: new Date().toISOString() };
    setMessages(function(prev) { return prev.concat([userMsg]); });
    setInput("");
    setLoading(true);
    setShowQuick(false);

    try {
      var res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: trimmed, engine: engine }),
      });
      if (!res.ok) throw new Error("Request failed");
      var data = await res.json();
      var botMsg = {
        role: "bot",
        content: data.response.text,
        symptoms: data.response.symptoms,
        diagnosis: data.response.diagnosis,
        severity: data.response.severity,
        timestamp: new Date().toISOString(),
      };
      setMessages(function(prev) { return prev.concat([botMsg]); });
    } catch (e) {
      setMessages(function(prev) { return prev.concat([{
        role: "bot", content: "⚠️ Sorry, I couldn't reach the server.", timestamp: new Date().toISOString()
      }]); });
    } finally {
      setLoading(false);
      if (inputRef.current) inputRef.current.focus();
    }
  }, [loading, sessionId, engine]);

  var handleReset = useCallback(async function() {
    if (!confirm("Start a new conversation? This will clear the current chat history.")) return;
    try { await fetch("/api/reset", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ session_id: sessionId }) }); } catch (e) {}
    var newSid = "web-" + crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, newSid);
    window.location.reload();
  }, [sessionId]);

  function handleSubmit(e) {
    e.preventDefault();
    sendMessage(input);
  }

  var placeholderText = engine === 'ai' ? 'Describe symptoms (AI Engine)...' : 'Describe symptoms (NLP Engine)...';

  return (
    <div className="flex flex-col h-screen max-w-3xl mx-auto bg-white shadow-xl">
      <Header onReset={handleReset} engine={engine} setEngine={setEngine} />
      <DisclaimerBanner />

      <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll p-4 bg-slate-50">
        {messages.map(function(m, i) {
          return <MessageBubble key={i} msg={m} engine={engine} />;
        })}
        {loading && (
          <div className="flex items-end gap-2 mb-3">
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm bg-teal-100 text-teal-700">🤖</div>
            <div className="bg-white border border-slate-200 rounded-2xl rounded-bl-sm px-4 py-3">
              <TypingIndicator />
            </div>
          </div>
        )}
      </div>

      {showQuick && messages.length <= 1 && (
        <QuickReplies onPick={function(s) { sendMessage(s); }} disabled={loading} />
      )}

      <form onSubmit={handleSubmit} className="border-t border-slate-200 p-3 bg-white flex gap-2">
        <input
          ref={inputRef}
          type="text"
          value={input}
          onChange={function(e) { setInput(e.target.value); }}
          placeholder={placeholderText}
          disabled={loading}
          className="flex-1 px-4 py-2.5 border border-slate-300 rounded-full focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent text-sm"
        />
        <button type="submit" disabled={loading || !input.trim()}
          className="bg-teal-600 hover:bg-teal-700 disabled:bg-slate-300 text-white rounded-full px-5 py-2.5 transition text-sm font-medium flex items-center gap-1">
          Send <span className="text-base">→</span>
        </button>
      </form>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
